# Docker Compose stack for CI / local integration tests against librtmp2-server.

services:
  server:
    build: ./librtmp2-server
    image: librtmp2-server-integration:local
    container_name: librtmp2-server-integration
    environment:
      LRTMP2_DB: /data/server.db
      LRTMP2_API_TOKEN: ${LRTMP2_API_TOKEN}
      LRTMP2_HTTP_BIND: 0.0.0.0:8080
      LRTMP2_RTMP_BIND: 0.0.0.0:1935
      LRTMP2_LOG_LEVEL: 1
      # HTTP rate limiting (optional — defaults shown):
      # LRTMP2_HTTP_RATE_LIMIT_WINDOW_SECS: 60
      # LRTMP2_HTTP_RATE_LIMIT_STATS: 30
      # LRTMP2_HTTP_RATE_LIMIT_API: 120
      # LRTMP2_HTTP_RATE_LIMIT_DEFAULT: 60
      # LRTMP2_HTTP_MAX_BODY_BYTES: 65536
    volumes:
      - integration-data:/data
    ports:
      - "8080:8080"
      - "1935:1935"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

volumes:
  integration-data:
