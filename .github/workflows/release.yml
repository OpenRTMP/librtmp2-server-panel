name: Release

# Builds and packages tagged releases. Push a tag like `v0.1.0` (or run
# manually) to produce a source tarball and a GitHub Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  verify:
    name: verify before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci-validation-only-32chars
          PASSWORD: test-password-for-ci-only
          LRTMP2_API_TOKEN: test-api-token-for-ci-only
        run: python -m pytest -q --tb=short -m "not integration"

  package:
    name: build & package
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section for this version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ ("^## \\[" ver "\\]")) { found=1; next }
              next
            }
            /^\[.*\]:/ { if (found) exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version $VERSION"
            exit 1
          fi
          cat release-notes.md

      - name: Create source tarball
        run: |
          mkdir -p dist
          git archive --format=tar.gz \
            --prefix="librtmp2-server-panel-${{ steps.ver.outputs.version }}/" \
            -o "dist/librtmp2-server-panel-${{ steps.ver.outputs.version }}-src.tar.gz" HEAD
          cd dist
          sha256sum "librtmp2-server-panel-${{ steps.ver.outputs.version }}-src.tar.gz" \
            > "librtmp2-server-panel-${{ steps.ver.outputs.version }}-src.tar.gz.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: librtmp2-server-panel-${{ steps.ver.outputs.version }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: librtmp2-server-panel ${{ steps.ver.outputs.version }}
          body_path: release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
