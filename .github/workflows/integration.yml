name: Integration

on:
  pull_request:
  workflow_dispatch:

jobs:
  panel-server-docker:
    name: panel + librtmp2-server (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout panel
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Determine librtmp2-server ref
        id: server_ref
        run: |
          CANDIDATE="${{ github.head_ref }}"
          if [ -n "$CANDIDATE" ] && git ls-remote --exit-code --heads \
              https://github.com/OpenRTMP/librtmp2-server.git "$CANDIDATE" >/dev/null 2>&1; then
            echo "ref=$CANDIDATE" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout librtmp2-server
        uses: actions/checkout@v7
        with:
          repository: OpenRTMP/librtmp2-server
          ref: ${{ steps.server_ref.outputs.ref }}
          path: librtmp2-server
          persist-credentials: false

      - name: Start librtmp2-server from source
        id: server_stack
        run: |
          TOKEN=$(python3 -c 'import secrets; print(secrets.token_hex(32))')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "LRTMP2_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          export LRTMP2_API_TOKEN="$TOKEN"
          docker compose -f docker-compose.integration.yml down -v --remove-orphans || true
          docker compose -f docker-compose.integration.yml up -d --build --wait

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run integration tests against live server
        env:
          RUN_INTEGRATION: "1"
          LRTMP2_API_URL: http://localhost:8080
          LRTMP2_STATS_URL: http://localhost:8080
          LRTMP2_API_TOKEN: ${{ steps.server_stack.outputs.token }}
          SECRET_KEY: test-secret-key-for-ci-validation-only-32chars
          PASSWORD: test-password-for-ci-only
        run: python -m pytest -m integration -q --tb=short

      - name: Tear down Docker stack
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v
