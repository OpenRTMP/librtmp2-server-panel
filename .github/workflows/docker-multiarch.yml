name: Docker Multi-Platform Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish alongside latest/beta/alpha (e.g. 0.1.0)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      #- name: Log in to Docker Hub
        #uses: docker/login-action@v4
        #with:
          #username: ${{ secrets.DOCKERHUB_USERNAME }}
          #password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          TAGS="ghcr.io/openrtmp/librtmp2-server-panel:latest
          ghcr.io/openrtmp/librtmp2-server-panel:beta
          ghcr.io/openrtmp/librtmp2-server-panel:alpha"
          if [ -n "${{ inputs.version }}" ]; then
            TAGS="$TAGS
          ghcr.io/openrtmp/librtmp2-server-panel:${{ inputs.version }}"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8,linux/riscv64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
