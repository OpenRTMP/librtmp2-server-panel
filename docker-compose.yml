services:
  redis:
    image: redis:7-alpine
    container_name: librtmp2-panel-redis
    restart: unless-stopped
    networks:
      - openrtmp
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  openrtmp-panel:
    build: .
    image: ghcr.io/OpenRTMP/librtmp2-server-panel:latest
    container_name: librtmp2-server-panel
    restart: unless-stopped
    environment:
      - LRTMP2_API_URL=http://openrtmp-server:8080
      - LRTMP2_STATS_URL=${LRTMP2_STATS_URL:-http://localhost:8080}
      - LRTMP2_API_TOKEN=${LRTMP2_API_TOKEN:?Set LRTMP2_API_TOKEN in .env}
      - LRTMP2_DOMAIN=${LRTMP2_DOMAIN:-localhost}
      - LRTMP2_RTMP_PORT=1935
      - LRTMP2_APP=live
      - REQUIRE_LOGIN=${REQUIRE_LOGIN:-True}
      - ALLOW_INSECURE_NO_LOGIN=${ALLOW_INSECURE_NO_LOGIN:-}
      - USERNAME=${USERNAME:-admin}
      - PASSWORD=${PASSWORD:?Set PASSWORD in .env}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - RATELIMIT_STORAGE_URI=${RATELIMIT_STORAGE_URI:-redis://redis:6379/0}
      - PANEL_PUBLIC_URL=${PANEL_PUBLIC_URL:-}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-}
      # Live stats polling limits for /streams/<id>/stats.json (per minute):
      # - STATS_RATE_LIMIT_PER_IP=600
      # - STATS_RATE_LIMIT_PER_STREAM=25
    ports:
      - "8000:8000"
    networks:
      - openrtmp
    depends_on:
      redis:
        condition: service_healthy
      openrtmp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/login"]
      interval: 30s
      timeout: 5s
      retries: 3

  openrtmp-server:
    build: ../librtmp2-server
    image: ghcr.io/OpenRTMP/librtmp2-server:latest
    container_name: librtmp2-server
    restart: unless-stopped
    environment:
      - LRTMP2_HTTP_BIND=0.0.0.0:8080
      - LRTMP2_RTMP_BIND=0.0.0.0:1935
      - LRTMP2_LOG_LEVEL=2
      - LRTMP2_API_TOKEN=${LRTMP2_API_TOKEN:?Set LRTMP2_API_TOKEN in .env}
      # HTTP rate limiting (sliding window per client IP + route class):
      # - LRTMP2_HTTP_RATE_LIMIT_WINDOW_SECS=60
      # - LRTMP2_HTTP_RATE_LIMIT_STATS=30      # /stats, /stats-nginx
      # - LRTMP2_HTTP_RATE_LIMIT_API=120       # /api/*
      # - LRTMP2_HTTP_RATE_LIMIT_DEFAULT=60    # other HTTP routes
      # - LRTMP2_HTTP_MAX_BODY_BYTES=65536
    volumes:
      - server-data:/data
    ports:
      - "1935:1935"
      - "8080:8080"
    networks:
      - openrtmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  server-data:

networks:
  openrtmp:
    driver: bridge
    enable_ipv6: true
