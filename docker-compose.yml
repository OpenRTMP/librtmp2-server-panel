services:
  librtmp2-panel:
    build: .
    image: librtmp2-server-panel:latest
    container_name: librtmp2-server-panel
    restart: unless-stopped
    environment:
      - LRTMP2_API_URL=http://librtmp2-server:8080
      - LRTMP2_API_TOKEN=${LRTMP2_API_TOKEN}
      - LRTMP2_DOMAIN=${LRTMP2_DOMAIN:-your-domain-or-ip}
      - LRTMP2_RTMP_PORT=1935
      - LRTMP2_APP=live
      - REQUIRE_LOGIN=True
      - USERNAME=${USERNAME:-admin}
      - PASSWORD=${PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - PANEL_DB_PATH=/data/panel.db
      - WERKZEUG_RUN_MAIN=true
    volumes:
      - panel-data:/data
    ports:
      - "8000:8000"

volumes:
  panel-data:
